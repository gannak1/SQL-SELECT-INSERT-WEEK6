  <text x="169" y="498" text-anchor="middle" font-family="Verdana, sans-serif" font-size="15" fill="#243B4A">trim_newline()</text>
  <text x="169" y="522" text-anchor="middle" font-family="Verdana, sans-serif" font-size="15" fill="#243B4A">trim_spaces()</text>
