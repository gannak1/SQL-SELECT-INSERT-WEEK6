  <text x="483" y="560" text-anchor="middle" font-family="Verdana, sans-serif" font-size="15" fill="#243B4A">parse_condition()</text>
  <text x="483" y="584" text-anchor="middle" font-family="Verdana, sans-serif" font-size="15" fill="#243B4A">parse_values_list()</text>

