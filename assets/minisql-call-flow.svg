  <text x="169" y="704" text-anchor="middle" font-family="Verdana, sans-serif" font-size="15" fill="#243B4A">has_complete_statement()</text>

  <rect x="358" y="126" width="250" height="690" rx="24" fill="#FFFDF9" stroke="#243B4A" stroke-width="4"/>
  <text x="483" y="166" text-anchor="middle" font-family="Verdana, sans-serif" font-size="24" font-weight="700" fill="#243B4A">2. Parse Stage</text>

